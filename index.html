<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tranzita Systems · DSA</title>
  <!-- Raw, unpolished fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&family=Space+Grotesk:wght@600;700;800&display=swap"
    rel="stylesheet">
  <style>
    /* ---------- NEW BRUTALISM – HARSH, BOLD, NO SHADOWS, STRAIGHT EDGES ---------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      -webkit-user-drag: none;
      -moz-user-drag: none;
      -o-user-drag: none;
      user-drag: none;
    }

    body {
      font-family: 'IBM Plex Mono', 'Space Grotesk', monospace, sans-serif;
      background: #f0f2f5;
      color: #000;
      line-height: 1.4;
    }

    input,
    button,
    .back-btn,
    .set-card,
    .modal-box,
    .error-message {
      -webkit-user-select: auto !important;
      -moz-user-select: auto !important;
      -ms-user-select: auto !important;
      user-select: auto !important;
    }

    /* ---------- BRUTALIST NAVIGATION – HEAVY BORDERS, NO ROUNDING ---------- */
    .navbar {
      background: #ffcc00;
      color: #000;
      padding: 1.2rem 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 1.6rem;
      font-weight: 800;
      font-family: 'Space Grotesk', sans-serif;
      text-transform: uppercase;
      letter-spacing: 2px;
      border-bottom: 6px solid #000;
      border-top: 6px solid #000;
    }

    /* ---------- BRUTALIST SETS GRID – RAW COLORS, FLAT, SHARP ---------- */
    .sets-screen {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2rem;
      padding: 2.5rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .set-card {
      background: white;
      border: 4px solid #000;
      padding: 2rem 1.8rem;
      cursor: pointer;
      transition: 0.05s linear;
      box-shadow: none;
      font-family: 'Space Grotesk', sans-serif;
    }

    .set-card:hover {
      background: #000;
      color: white;
      border-color: #000;
      transform: translate(-6px, -6px);
      box-shadow: 12px 12px 0 rgba(0, 0, 0, 0.2);
    }

    .set-card:hover .set-title,
    .set-card:hover .set-title span {
      color: white;
    }

    /* brutalist color blocks – no subtlety */
    .set-card:nth-child(1) {
      background: #ffb8b8;
      border-color: #000;
    }

    .set-card:nth-child(2) {
      background: #aaffaa;
      border-color: #000;
    }

    .set-card:nth-child(3) {
      background: #aaddff;
      border-color: #000;
    }

    .set-title {
      font-size: 2.2rem;
      font-weight: 800;
      color: #000;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Space Grotesk', sans-serif;
      text-transform: uppercase;
    }

    .set-title span {
      font-size: 2rem;
    }

    /* ---------- QUESTION VIEW – NO ROUNDED CORNERS, THICK BORDERS ---------- */
    .questions-screen {
      display: none;
      padding: 2.5rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    .back-btn {
      display: inline-block;
      padding: 0.8rem 1.8rem;
      background: #ffffff;
      border: 4px solid #000;
      font-weight: 700;
      color: #000;
      margin-bottom: 2rem;
      cursor: pointer;
      font-size: 1.2rem;
      font-family: 'Space Grotesk', sans-serif;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: 0.05s linear;
    }

    .back-btn:hover {
      background: #000;
      color: white;
      border-color: #000;
      transform: translate(-4px, -4px);
      box-shadow: 8px 8px 0 #aaa;
    }

    .q-card {
      background: white;
      border: 4px solid #000;
      padding: 2rem 2rem;
      margin-bottom: 2.5rem;
      box-shadow: 12px 12px 0 #000;
    }

    .q-title {
      font-size: 2rem;
      font-weight: 800;
      color: #000;
      margin-bottom: 1.5rem;
      padding-bottom: 0.5rem;
      border-bottom: 6px solid #000;
      display: inline-block;
      font-family: 'Space Grotesk', sans-serif;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .section {
      margin-top: 2rem;
    }

    .section strong {
      font-weight: 700;
      color: #000;
      font-size: 1.2rem;
      display: block;
      margin-bottom: 0.6rem;
      font-family: 'Space Grotesk', sans-serif;
      text-transform: uppercase;
      border-left: 10px solid #000;
      padding-left: 0.8rem;
    }

    .problem-statement {
      background: #f0f0f0;
      border: 4px solid #000;
      padding: 1.2rem 1.4rem;
      margin-top: 0.3rem;
      color: #000;
      font-size: 1rem;
      line-height: 1.6;
      font-family: 'IBM Plex Mono', monospace;
    }

    /* ---------- BRUTALIST EXAMPLES – HARSH, CLEAR LABELS ---------- */
    .examples-list {
      background: #fff;
      border: 4px solid #000;
      padding: 1.5rem 1.5rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.95rem;
      color: #000;
    }

    .example-item {
      margin-bottom: 1.2rem;
      padding-bottom: 1.2rem;
      border-bottom: 3px dashed #000;
    }

    .example-item:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .example-input {
      color: #000;
      font-weight: 700;
      background: #ffed8c;
      display: inline-block;
      padding: 0.1rem 0.4rem;
      border: 2px solid #000;
    }

    /* ---------- BRUTALIST MODAL – NO GRACE, ALL EDGES ---------- */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-box {
      background: white;
      border: 6px solid #000;
      padding: 2.5rem;
      width: 380px;
      box-shadow: 16px 16px 0 #000;
    }

    .modal-box h3 {
      font-size: 2rem;
      font-weight: 800;
      color: #000;
      margin-bottom: 0.5rem;
      font-family: 'Space Grotesk', sans-serif;
      text-transform: uppercase;
      border-bottom: 6px solid #000;
      display: inline-block;
    }

    input {
      width: 100%;
      padding: 1rem 1.2rem;
      margin-top: 2rem;
      border: 4px solid #000;
      border-radius: 0;
      font-size: 1.2rem;
      font-family: 'IBM Plex Mono', monospace;
      background: #fff;
    }

    input:focus {
      border-color: #000;
      outline: none;
      background: #feffc2;
    }

    button {
      width: 100%;
      margin-top: 2rem;
      padding: 1rem;
      border: 4px solid #000;
      background: #000;
      color: white;
      font-weight: 800;
      font-size: 1.2rem;
      border-radius: 0;
      cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    button:hover {
      background: white;
      color: black;
      border-color: black;
      transform: translate(-4px, -4px);
      box-shadow: 8px 8px 0 #000;
    }

    .error-message {
      color: #d10000;
      font-size: 1rem;
      margin-top: 1rem;
      font-weight: 700;
      display: none;
      border-left: 8px solid #d10000;
      padding-left: 0.8rem;
      text-transform: uppercase;
    }

    .error-message.visible {
      display: block;
    }
  </style>
</head>

<body oncontextmenu="return false;" oncopy="return false;" oncut="return false;" onpaste="return false;"
  onselectstart="return false;" ondragstart="return false;">

  <div class="navbar">
    <div>Tranzita Systems - DSA</div>
  </div>

  <!-- SETS -->
  <div class="sets-screen" id="setsScreen"></div>

  <!-- QUESTIONS -->
  <div class="questions-screen" id="questionsScreen">
    <div class="back-btn" id="backButton">← BACK TO SETS</div>
    <div id="questionsContainer"></div>
  </div>

  <!-- PASSWORD MODAL -->
  <div class="modal" id="modal" style="display:none">
    <div class="modal-box">
      <h3>PASSWORD</h3>
      <input type="password" id="passwordInput" autofocus>
      <div class="error-message" id="passwordError">INCORRECT PASSWORD</div>
      <button id="unlockButton">UNLOCK →</button>
    </div>
  </div>

  <script>
    (function () {
      "use strict";

      // ---------- SECURITY ----------
      document.addEventListener('keydown', function (e) {
        if (e.ctrlKey || e.metaKey) {
          if (['c', 'C', 'v', 'V', 'x', 'X', 's', 'S', 'u', 'U', 'p', 'P', 'a', 'A'].includes(e.key)) {
            e.preventDefault(); e.stopPropagation(); return false;
          }
        }
        if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && ['I', 'i', 'J', 'j', 'C', 'c'].includes(e.key))) {
          e.preventDefault(); e.stopPropagation(); return false;
        }
      });
      document.addEventListener('copy', e => e.preventDefault());
      document.addEventListener('cut', e => e.preventDefault());
      document.addEventListener('paste', e => e.preventDefault());
      document.addEventListener('selectstart', e => e.preventDefault());
      document.addEventListener('dragstart', e => e.preventDefault());
      document.addEventListener('contextmenu', e => e.preventDefault());

      // ---------- CONFIG ----------
      const LOCK_DURATION = 60 * 60 * 1000;
      const PASSWORDS = ["set1", "set2", "set3"];

      // ---------- DSA SETS – EASY TO MODERATE (FULL REPLACEMENT) ----------
// ---------- DSA SETS – EASY TO MODERATE (SCENARIO BASED) ----------
// ---------- DSA SETS – EASY TO MODERATE (SCENARIO BASED – FULL REPLACEMENT) ----------
// ---------- DSA SETS – BALANCED DIFFICULTY (4 QUESTIONS EACH) ----------
const SETS = [
        [ // SET 1
          {
            title: "Find Maximum Temperature",
            difficulty: "Easy",
            desc: `A weather station records hourly temperatures.
      
      Return the highest temperature recorded in the list.`,
            examples: [
              "Input: [30,32,29,35,31] → Output: 35",
              "Input: [10,15,12] → Output: 15"
            ]
          },
      
          {
            title: "Find First Duplicate Transaction ID",
            difficulty: "Easy - Moderate",
            desc: `A payment gateway logs transaction IDs.
      
      Sometimes the same transaction ID appears again due to retry requests.
      Return the first transaction ID that appears more than once.
      
      Do NOT use set(), Counter, or other duplicate detection utilities.`,
            examples: [
              "Input: [101,203,405,203,500] → Output: 203",
              "Input: [5,7,9,5] → Output: 5"
            ]
          },
      
          {
            title: "Reverse Customer Queue",
            difficulty: "Easy - Moderate",
            desc: `A support system stores customers waiting in a queue.
      
      Return the queue in reverse order.
      
      Do NOT use reverse(), slicing tricks, or similar built-in utilities.`,
            examples: [
              "Input: [1,2,3,4] → Output: [4,3,2,1]",
              "Input: [7,8,9] → Output: [9,8,7]"
            ]
          },
      
          {
            title: "Second Highest Salary",
            difficulty: "Moderate",
            desc: `A company records employee salaries.
      
      Return the second highest salary in the list.
      
      Built-in sorting utilities like sorted() or list.sort() are NOT allowed.`,
            examples: [
              "Input: [45000,60000,55000,70000] → Output: 60000",
              "Input: [10,20,30] → Output: 20"
            ]
          }
        ],
      
        [ // SET 2
          {
            title: "Count Total Orders",
            difficulty: "Easy",
            desc: `An online store records order IDs in a list.
      
      Return the total number of orders.`,
            examples: [
              "Input: [101,102,103] → Output: 3",
              "Input: [10,20] → Output: 2"
            ]
          },
      
          {
            title: "Find Missing Ticket Number",
            difficulty: "Easy - Moderate",
            desc: `Ticket numbers are generated from 1 to N.
      
      One number is missing in the list.
      Return the missing number.`,
            examples: [
              "Input: [1,2,4,5] → Output: 3",
              "Input: [2,3,4] → Output: 1"
            ]
          },
      
          {
            title: "Longest Username",
            difficulty: "Easy - Moderate",
            desc: `A platform stores usernames.
      
      Return the username with the greatest length.
      If multiple names have the same length, return the first one.`,
            examples: [
              'Input: ["sam","alexander","tom"] → Output: "alexander"',
              'Input: ["aa","bbbb","ccc"] → Output: "bbbb"'
            ]
          },
      
          {
            title: "Manual Sorting of Scores",
            difficulty: "Moderate",
            desc: `A teacher records student scores.
      
      Return the scores sorted in ascending order.
      
      You must implement the sorting logic manually.
      Built-in sorting utilities like sorted() or list.sort() are NOT allowed.`,
            examples: [
              "Input: [50,30,80,60] → Output: [30,50,60,80]",
              "Input: [5,1,3] → Output: [1,3,5]"
            ]
          }
        ],
      
        [ // SET 3
          {
            title: "Find Minimum Price",
            difficulty: "Easy",
            desc: `A store records product prices.
      
      Return the minimum price from the list.`,
            examples: [
              "Input: [120,90,150,80] → Output: 80",
              "Input: [10,5,8] → Output: 5"
            ]
          },
      
          {
            title: "Count Occurrences of a Product ID",
            difficulty: "Easy - Moderate",
            desc: `An inventory system logs product IDs.
      
      Count how many times a given product ID appears in the list.`,
            examples: [
              "Input: [10,20,10,30,10], target=10 → Output: 3",
              "Input: [5,6,7], target=6 → Output: 1"
            ]
          },
      
          {
            title: "Find All Values Below Threshold",
            difficulty: "Easy - Moderate",
            desc: `A warehouse records inventory quantities.
      
      Return all values that are below the provided threshold.`,
            examples: [
              "Input: inventory=[50,20,15,60], threshold=25 → Output: [20,15]",
              "Input: inventory=[5,8,12], threshold=10 → Output: [5,8]"
            ]
          },
      
          {
            title: "Merge Two Sales Lists",
            difficulty: "Moderate",
            desc: `Two stores report daily sales numbers separately.
      
      Combine both lists into one sorted list in ascending order.
      
      Sorting must be implemented manually.
      Built-in sorting functions are not allowed.`,
            examples: [
              "Input: storeA=[5,2], storeB=[7,1] → Output: [1,2,5,7]",
              "Input: storeA=[10], storeB=[3,6] → Output: [3,6,10]"
            ]
          }
        ]
      ];

      // ---------- STATE ----------
      let activeInterval = null;
      let selectedSetIndex = null;

      const setsScreen = document.getElementById('setsScreen');
      const questionsScreen = document.getElementById('questionsScreen');
      const questionsContainer = document.getElementById('questionsContainer');
      const modal = document.getElementById('modal');
      const passwordInput = document.getElementById('passwordInput');
      const passwordError = document.getElementById('passwordError');
      const unlockBtn = document.getElementById('unlockButton');
      const backBtn = document.getElementById('backButton');

      // ---------- HELPERS ----------
      function getLock(i) {
        return JSON.parse(localStorage.getItem('dsa_set_' + i));
      }

      function isUnlocked(i) {
        let data = getLock(i);
        if (!data) return false;
        if (Date.now() > data.expiry) {
          localStorage.removeItem('dsa_set_' + i);
          return false;
        }
        return true;
      }

      function unlock(i) {
        let expiry = Date.now() + LOCK_DURATION;
        localStorage.setItem('dsa_set_' + i, JSON.stringify({ expiry }));
      }

      function hideError() {
        passwordError.classList.remove('visible');
      }

      function showError() {
        passwordError.classList.add('visible');
      }

      // ---------- RENDER SETS ----------
      function renderSets() {
        setsScreen.innerHTML = '';
        for (let i = 0; i < 3; i++) {
          let unlocked = isUnlocked(i);
          let div = document.createElement('div');
          div.className = 'set-card';
          div.innerHTML = `
          <div class="set-title">SET ${i + 1} <span>${unlocked ? '🔓' : '🔒'}</span></div>
        `;
          div.onclick = () => {
            if (unlocked) {
              openSet(i);
            } else {
              selectedSetIndex = i;
              modal.style.display = 'flex';
              passwordInput.value = '';
              passwordError.classList.remove('visible');
              passwordInput.focus();
            }
          };
          setsScreen.appendChild(div);
        }
      }

      // ---------- PASSWORD VERIFICATION ----------
      window.verifyPassword = function () {
        let pwd = passwordInput.value.trim();
        if (selectedSetIndex === null) return;

        if (pwd === PASSWORDS[selectedSetIndex]) {
          unlock(selectedSetIndex);
          modal.style.display = 'none';
          passwordInput.value = '';
          passwordError.classList.remove('visible');
          openSet(selectedSetIndex);
          renderSets();
        } else {
          showError();
          passwordInput.value = '';
          passwordInput.focus();
        }
      };

      passwordInput.addEventListener('keydown', function (e) {
        hideError();
        if (e.key === 'Enter') {
          e.preventDefault();
          window.verifyPassword();
        }
      });

      passwordInput.addEventListener('input', hideError);

      if (unlockBtn) {
        unlockBtn.addEventListener('click', window.verifyPassword);
      }

      window.onclick = function (e) {
        if (e.target === modal) {
          modal.style.display = 'none';
          passwordInput.value = '';
          passwordError.classList.remove('visible');
        }
      };

      // ---------- OPEN SET – NO TIMER, BRUTALIST EXAMPLES ----------
      function openSet(i) {
        let lockData = getLock(i);
        if (!lockData) return;

        setsScreen.style.display = 'none';
        questionsScreen.style.display = 'block';
        questionsContainer.innerHTML = '';

        SETS[i].forEach((q, idx) => {
          let card = document.createElement('div');
          card.className = 'q-card';

          // Build examples HTML with clear Input/Output labels
          let examplesHtml = '<div class="examples-list">';
          q.examples.forEach(ex => {
            examplesHtml += `<div class="example-item">
            <span class="example-input">${ex}</span>
          </div>`;
          });
          examplesHtml += '</div>';

          card.innerHTML = `
          <div class="q-title">${idx + 1}. ${q.title}</div>
          <div class="section">
            <strong>PROBLEM</strong>
            <div class="problem-statement">${q.desc}</div>
          </div>
          <div class="section">
            <strong>EXAMPLES</strong>
            ${examplesHtml}
          </div>
        `;
          questionsContainer.appendChild(card);
        });
      }

      // ---------- BACK ----------
      window.goBack = function () {
        questionsScreen.style.display = 'none';
        setsScreen.style.display = 'grid';
      };

      backBtn.addEventListener('click', window.goBack);

      // ---------- INIT ----------
      renderSets();
    })();
  </script>

</body>

</html>
