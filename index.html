<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tranzita Systems · DSA</title>
  <!-- Raw, unpolished fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&family=Space+Grotesk:wght@600;700;800&display=swap"
    rel="stylesheet">
  <style>
    /* ---------- NEW BRUTALISM – HARSH, BOLD, NO SHADOWS, STRAIGHT EDGES ---------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      -webkit-user-drag: none;
      -moz-user-drag: none;
      -o-user-drag: none;
      user-drag: none;
    }

    body {
      font-family: 'IBM Plex Mono', 'Space Grotesk', monospace, sans-serif;
      background: #f0f2f5;
      color: #000;
      line-height: 1.4;
    }

    input,
    button,
    .back-btn,
    .set-card,
    .modal-box,
    .error-message {
      -webkit-user-select: auto !important;
      -moz-user-select: auto !important;
      -ms-user-select: auto !important;
      user-select: auto !important;
    }

    /* ---------- BRUTALIST NAVIGATION – HEAVY BORDERS, NO ROUNDING ---------- */
    .navbar {
      background: #ffcc00;
      color: #000;
      padding: 1.2rem 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 1.6rem;
      font-weight: 800;
      font-family: 'Space Grotesk', sans-serif;
      text-transform: uppercase;
      letter-spacing: 2px;
      border-bottom: 6px solid #000;
      border-top: 6px solid #000;
    }

    /* ---------- BRUTALIST SETS GRID – RAW COLORS, FLAT, SHARP ---------- */
    .sets-screen {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2rem;
      padding: 2.5rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .set-card {
      background: white;
      border: 4px solid #000;
      padding: 2rem 1.8rem;
      cursor: pointer;
      transition: 0.05s linear;
      box-shadow: none;
      font-family: 'Space Grotesk', sans-serif;
    }

    .set-card:hover {
      background: #000;
      color: white;
      border-color: #000;
      transform: translate(-6px, -6px);
      box-shadow: 12px 12px 0 rgba(0, 0, 0, 0.2);
    }

    .set-card:hover .set-title,
    .set-card:hover .set-title span {
      color: white;
    }

    /* brutalist color blocks – no subtlety */
    .set-card:nth-child(1) {
      background: #ffb8b8;
      border-color: #000;
    }

    .set-card:nth-child(2) {
      background: #aaffaa;
      border-color: #000;
    }

    .set-card:nth-child(3) {
      background: #aaddff;
      border-color: #000;
    }

    .set-title {
      font-size: 2.2rem;
      font-weight: 800;
      color: #000;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Space Grotesk', sans-serif;
      text-transform: uppercase;
    }

    .set-title span {
      font-size: 2rem;
    }

    /* ---------- QUESTION VIEW – NO ROUNDED CORNERS, THICK BORDERS ---------- */
    .questions-screen {
      display: none;
      padding: 2.5rem;
      max-width: 1100px;
      margin: 0 auto;
    }

    .back-btn {
      display: inline-block;
      padding: 0.8rem 1.8rem;
      background: #ffffff;
      border: 4px solid #000;
      font-weight: 700;
      color: #000;
      margin-bottom: 2rem;
      cursor: pointer;
      font-size: 1.2rem;
      font-family: 'Space Grotesk', sans-serif;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: 0.05s linear;
    }

    .back-btn:hover {
      background: #000;
      color: white;
      border-color: #000;
      transform: translate(-4px, -4px);
      box-shadow: 8px 8px 0 #aaa;
    }

    .q-card {
      background: white;
      border: 4px solid #000;
      padding: 2rem 2rem;
      margin-bottom: 2.5rem;
      box-shadow: 12px 12px 0 #000;
    }

    .q-title {
      font-size: 2rem;
      font-weight: 800;
      color: #000;
      margin-bottom: 1.5rem;
      padding-bottom: 0.5rem;
      border-bottom: 6px solid #000;
      display: inline-block;
      font-family: 'Space Grotesk', sans-serif;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .section {
      margin-top: 2rem;
    }

    .section strong {
      font-weight: 700;
      color: #000;
      font-size: 1.2rem;
      display: block;
      margin-bottom: 0.6rem;
      font-family: 'Space Grotesk', sans-serif;
      text-transform: uppercase;
      border-left: 10px solid #000;
      padding-left: 0.8rem;
    }

    .problem-statement {
      background: #f0f0f0;
      border: 4px solid #000;
      padding: 1.2rem 1.4rem;
      margin-top: 0.3rem;
      color: #000;
      font-size: 1rem;
      line-height: 1.6;
      font-family: 'IBM Plex Mono', monospace;
    }

    /* ---------- BRUTALIST EXAMPLES – HARSH, CLEAR LABELS ---------- */
    .examples-list {
      background: #fff;
      border: 4px solid #000;
      padding: 1.5rem 1.5rem;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.95rem;
      color: #000;
    }

    .example-item {
      margin-bottom: 1.2rem;
      padding-bottom: 1.2rem;
      border-bottom: 3px dashed #000;
    }

    .example-item:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .example-input {
      color: #000;
      font-weight: 700;
      background: #ffed8c;
      display: inline-block;
      padding: 0.1rem 0.4rem;
      border: 2px solid #000;
    }

    /* ---------- BRUTALIST MODAL – NO GRACE, ALL EDGES ---------- */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .modal-box {
      background: white;
      border: 6px solid #000;
      padding: 2.5rem;
      width: 380px;
      box-shadow: 16px 16px 0 #000;
    }

    .modal-box h3 {
      font-size: 2rem;
      font-weight: 800;
      color: #000;
      margin-bottom: 0.5rem;
      font-family: 'Space Grotesk', sans-serif;
      text-transform: uppercase;
      border-bottom: 6px solid #000;
      display: inline-block;
    }

    input {
      width: 100%;
      padding: 1rem 1.2rem;
      margin-top: 2rem;
      border: 4px solid #000;
      border-radius: 0;
      font-size: 1.2rem;
      font-family: 'IBM Plex Mono', monospace;
      background: #fff;
    }

    input:focus {
      border-color: #000;
      outline: none;
      background: #feffc2;
    }

    button {
      width: 100%;
      margin-top: 2rem;
      padding: 1rem;
      border: 4px solid #000;
      background: #000;
      color: white;
      font-weight: 800;
      font-size: 1.2rem;
      border-radius: 0;
      cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    button:hover {
      background: white;
      color: black;
      border-color: black;
      transform: translate(-4px, -4px);
      box-shadow: 8px 8px 0 #000;
    }

    .error-message {
      color: #d10000;
      font-size: 1rem;
      margin-top: 1rem;
      font-weight: 700;
      display: none;
      border-left: 8px solid #d10000;
      padding-left: 0.8rem;
      text-transform: uppercase;
    }

    .error-message.visible {
      display: block;
    }
  </style>
</head>

<body oncontextmenu="return false;" oncopy="return false;" oncut="return false;" onpaste="return false;"
  onselectstart="return false;" ondragstart="return false;">

  <div class="navbar">
    <div>Tranzita Systems - DSA</div>
  </div>

  <!-- SETS -->
  <div class="sets-screen" id="setsScreen"></div>

  <!-- QUESTIONS -->
  <div class="questions-screen" id="questionsScreen">
    <div class="back-btn" id="backButton">← BACK TO SETS</div>
    <div id="questionsContainer"></div>
  </div>

  <!-- PASSWORD MODAL -->
  <div class="modal" id="modal" style="display:none">
    <div class="modal-box">
      <h3>PASSWORD</h3>
      <input type="password" id="passwordInput" autofocus>
      <div class="error-message" id="passwordError">INCORRECT PASSWORD</div>
      <button id="unlockButton">UNLOCK →</button>
    </div>
  </div>

  <script>
    (function () {
      "use strict";

      // ---------- SECURITY ----------
      document.addEventListener('keydown', function (e) {
        if (e.ctrlKey || e.metaKey) {
          if (['c', 'C', 'v', 'V', 'x', 'X', 's', 'S', 'u', 'U', 'p', 'P', 'a', 'A'].includes(e.key)) {
            e.preventDefault(); e.stopPropagation(); return false;
          }
        }
        if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && ['I', 'i', 'J', 'j', 'C', 'c'].includes(e.key))) {
          e.preventDefault(); e.stopPropagation(); return false;
        }
      });
      document.addEventListener('copy', e => e.preventDefault());
      document.addEventListener('cut', e => e.preventDefault());
      document.addEventListener('paste', e => e.preventDefault());
      document.addEventListener('selectstart', e => e.preventDefault());
      document.addEventListener('dragstart', e => e.preventDefault());
      document.addEventListener('contextmenu', e => e.preventDefault());

      // ---------- CONFIG ----------
      const LOCK_DURATION = 60 * 60 * 1000;
      const PASSWORDS = ["set1", "set2", "set3"];

      // ---------- DSA SETS – EASY TO MODERATE (FULL REPLACEMENT) ----------
// ---------- DSA SETS – EASY TO MODERATE (SCENARIO BASED) ----------
const SETS = [
  [ // SET 1
    {
      title: "Log Deduplication",
      desc: `A system generates a list of log IDs representing requests processed by a server.

Some requests may appear multiple times due to retries. Your task is to return a new list containing only the first occurrence of each log ID while preserving the original order.

Do NOT use built-in functions such as set(), dict-based deduplication, or library utilities that remove duplicates. Implement the logic manually.`,
      examples: [
        "Input: [101,102,101,103,102,104] → Output: [101,102,103,104]",
        "Input: [5,5,5,5] → Output: [5]"
      ]
    },
    {
      title: "Manual Sorting of Transaction Amounts",
      desc: `You are given a list of transaction amounts recorded during the day.

Sort the amounts in ascending order.

You must implement the sorting logic manually. Built-in sorting utilities such as sorted(), list.sort(), numpy.sort(), or similar are NOT allowed.`,
      examples: [
        "Input: [500,1200,150,800] → Output: [150,500,800,1200]",
        "Input: [9,1,4,2] → Output: [1,2,4,9]"
      ]
    },
    {
      title: "Peak Website Traffic",
      desc: `A monitoring system records the number of users visiting a website every minute.

Return the maximum number of users recorded in the list.`,
      examples: [
        "Input: [12,45,32,67,34] → Output: 67",
        "Input: [5,5,5,5] → Output: 5"
      ]
    }
  ],

  [ // SET 2
    {
      title: "Find Missing Ticket Number",
      desc: `An event generates ticket numbers from 1 to N. However, due to a system issue, one ticket number is missing in the recorded list.

Given the list of issued ticket numbers, identify the missing number.

Assume exactly one ticket number is missing.`,
      examples: [
        "Input: [1,2,4,5] → Output: 3",
        "Input: [2,3,4,5] → Output: 1"
      ]
    },
    {
      title: "Customer Queue Simulation",
      desc: `Customers arrive at a service desk. Each number in the list represents the time required (in minutes) to serve that customer.

Calculate the total time required to serve all customers sequentially.`,
      examples: [
        "Input: [3,5,2,4] → Output: 14",
        "Input: [10,1] → Output: 11"
      ]
    },
    {
      title: "Find Duplicate Order ID",
      desc: `An order processing system mistakenly recorded one order ID twice.

Given a list of order IDs where exactly one ID is duplicated, return the duplicate value.

Do NOT use set(), collections.Counter, or similar library helpers.`,
      examples: [
        "Input: [11,22,33,44,22] → Output: 22",
        "Input: [5,3,1,4,3] → Output: 3"
      ]
    }
  ],

  [ // SET 3
    {
      title: "Inventory Restock Alert",
      desc: `A warehouse stores daily inventory levels of a product.

If inventory drops below a threshold value, a restock alert should be triggered.

Return all inventory values that are below the given threshold.`,
      examples: [
        "Input: inventory=[50,42,18,60,15], threshold=20 → Output: [18,15]",
        "Input: inventory=[10,12,9], threshold=11 → Output: [10,9]"
      ]
    },
    {
      title: "Longest Continuous Work Streak",
      desc: `An employee attendance system records whether an employee worked on a given day (1) or took leave (0).

Return the longest continuous streak of working days.`,
      examples: [
        "Input: [1,1,0,1,1,1] → Output: 3",
        "Input: [1,0,1,0,1] → Output: 1"
      ]
    },
    {
      title: "Merge Daily Sales Records",
      desc: `Two branches report their daily sales numbers separately.

Combine both lists into a single sorted list in ascending order.

You must implement the sorting logic manually. Built-in sorting utilities are not allowed.`,
      examples: [
        "Input: branchA=[5,8,2], branchB=[7,1] → Output: [1,2,5,7,8]",
        "Input: branchA=[10], branchB=[3,6] → Output: [3,6,10]"
      ]
    }
  ]
];

      // ---------- STATE ----------
      let activeInterval = null;
      let selectedSetIndex = null;

      const setsScreen = document.getElementById('setsScreen');
      const questionsScreen = document.getElementById('questionsScreen');
      const questionsContainer = document.getElementById('questionsContainer');
      const modal = document.getElementById('modal');
      const passwordInput = document.getElementById('passwordInput');
      const passwordError = document.getElementById('passwordError');
      const unlockBtn = document.getElementById('unlockButton');
      const backBtn = document.getElementById('backButton');

      // ---------- HELPERS ----------
      function getLock(i) {
        return JSON.parse(localStorage.getItem('dsa_set_' + i));
      }

      function isUnlocked(i) {
        let data = getLock(i);
        if (!data) return false;
        if (Date.now() > data.expiry) {
          localStorage.removeItem('dsa_set_' + i);
          return false;
        }
        return true;
      }

      function unlock(i) {
        let expiry = Date.now() + LOCK_DURATION;
        localStorage.setItem('dsa_set_' + i, JSON.stringify({ expiry }));
      }

      function hideError() {
        passwordError.classList.remove('visible');
      }

      function showError() {
        passwordError.classList.add('visible');
      }

      // ---------- RENDER SETS ----------
      function renderSets() {
        setsScreen.innerHTML = '';
        for (let i = 0; i < 3; i++) {
          let unlocked = isUnlocked(i);
          let div = document.createElement('div');
          div.className = 'set-card';
          div.innerHTML = `
          <div class="set-title">SET ${i + 1} <span>${unlocked ? '🔓' : '🔒'}</span></div>
        `;
          div.onclick = () => {
            if (unlocked) {
              openSet(i);
            } else {
              selectedSetIndex = i;
              modal.style.display = 'flex';
              passwordInput.value = '';
              passwordError.classList.remove('visible');
              passwordInput.focus();
            }
          };
          setsScreen.appendChild(div);
        }
      }

      // ---------- PASSWORD VERIFICATION ----------
      window.verifyPassword = function () {
        let pwd = passwordInput.value.trim();
        if (selectedSetIndex === null) return;

        if (pwd === PASSWORDS[selectedSetIndex]) {
          unlock(selectedSetIndex);
          modal.style.display = 'none';
          passwordInput.value = '';
          passwordError.classList.remove('visible');
          openSet(selectedSetIndex);
          renderSets();
        } else {
          showError();
          passwordInput.value = '';
          passwordInput.focus();
        }
      };

      passwordInput.addEventListener('keydown', function (e) {
        hideError();
        if (e.key === 'Enter') {
          e.preventDefault();
          window.verifyPassword();
        }
      });

      passwordInput.addEventListener('input', hideError);

      if (unlockBtn) {
        unlockBtn.addEventListener('click', window.verifyPassword);
      }

      window.onclick = function (e) {
        if (e.target === modal) {
          modal.style.display = 'none';
          passwordInput.value = '';
          passwordError.classList.remove('visible');
        }
      };

      // ---------- OPEN SET – NO TIMER, BRUTALIST EXAMPLES ----------
      function openSet(i) {
        let lockData = getLock(i);
        if (!lockData) return;

        setsScreen.style.display = 'none';
        questionsScreen.style.display = 'block';
        questionsContainer.innerHTML = '';

        SETS[i].forEach((q, idx) => {
          let card = document.createElement('div');
          card.className = 'q-card';

          // Build examples HTML with clear Input/Output labels
          let examplesHtml = '<div class="examples-list">';
          q.examples.forEach(ex => {
            examplesHtml += `<div class="example-item">
            <span class="example-input">${ex}</span>
          </div>`;
          });
          examplesHtml += '</div>';

          card.innerHTML = `
          <div class="q-title">${idx + 1}. ${q.title}</div>
          <div class="section">
            <strong>PROBLEM</strong>
            <div class="problem-statement">${q.desc}</div>
          </div>
          <div class="section">
            <strong>EXAMPLES</strong>
            ${examplesHtml}
          </div>
        `;
          questionsContainer.appendChild(card);
        });
      }

      // ---------- BACK ----------
      window.goBack = function () {
        questionsScreen.style.display = 'none';
        setsScreen.style.display = 'grid';
      };

      backBtn.addEventListener('click', window.goBack);

      // ---------- INIT ----------
      renderSets();
    })();
  </script>

</body>

</html>
